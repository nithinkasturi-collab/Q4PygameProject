<!DOCTYPE html>
<html>
<head>
    <title>File Browser</title>
</head>
<body>
    <h1>Project Files</h1>
    <div id="file-list">Loading files...</div>

    <script>
        (async () => {
            // Replace :user and :repo with your details
            const response = await fetch('https://api.github.com/repos/:user/:repo/contents/');
            const data = await response.json();
            let htmlString = '<ul>';
            for (let file of data) {
                // Creates direct links to view the files on GitHub Pages
                htmlString += `<li><a href="${file.path}">${file.name}</a></li>`;
            }
            htmlString += '</ul>';
            document.getElementById('file-list').innerHTML = htmlString;
        })()
    </script>
</body>
</html>
