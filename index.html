<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Browser</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 2rem; background: #f6f8fa; color: #24292f; }
        h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px 12px; background: white; margin-bottom: 8px; border: 1px solid #d0d7de; border-radius: 6px; display: flex; align-items: center; }
        a { color: #0969da; text-decoration: none; font-weight: 500; width: 100%; }
        a:hover { text-decoration: underline; }
        .icon { margin-right: 10px; font-weight: bold; }
        .error { color: #cf222e; background: #ffebe9; padding: 12px; border: 1px solid #ffc1c0; border-radius: 6px; }
    </style>
</head>
<body>

    <h1>Code Browser</h1>
    <div id="file-list">Loading repository contents...</div>

    <script>
        async function fetchRepoFiles() {
            const username = 'nithinkasturi-collab';
            const container = document.getElementById('file-list');
            
            // Correctly extracts the repository name from the first segment of the path
            const pathSegments = window.location.pathname.split('/').filter(Boolean);
            const repo = pathSegments[0]; 

            if (!repo) {
                container.innerHTML = '<p class="error">Error: Cannot detect repository name. Ensure this page is accessed via your GitHub Pages URL.</p>';
                return;
            }

            // Fixed official GitHub API URL
            const apiUrl = `github.com{username}/${repo}/contents`;

            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Repository not found. Verify that the repository is Public.');
                    }
                    throw new Error(`GitHub API returned status ${response.status}`);
                }
                
                const files = await response.json();
                let html = '<ul>';

                // Sort folders first, then files
                files.sort((a, b) => (b.type === 'dir') - (a.type === 'dir'));

                let displayedItemsCount = 0;

                files.forEach(file => {
                    // Do not show the browser script page itself
                    if (file.name === 'index.html') return;

                    displayedItemsCount++;
                    const isDir = file.type === 'dir';
                    const icon = isDir ? '📁' : '📄';
                    const targetUrl = isDir ? `${file.name}/` : file.name;

                    html += `<li><span class="icon">${icon}</span><a href="${targetUrl}">${file.name}</a></li>`;
                });

                html += '</ul>';
                container.innerHTML = displayedItemsCount === 0 ? '<p>No files found in this repository.</p>' : html;

            } catch (error) {
                container.innerHTML = `<p class="error"><strong>Error:</strong> ${error.message}</p>`;
            }
        }

        fetchRepoFiles();
    </script>
</body>
</html>
