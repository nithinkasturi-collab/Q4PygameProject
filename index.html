<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Browser</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 2rem; background: #f6f8fa; color: #24292f; }
        h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px 12px; background: white; margin-bottom: 8px; border: 1px solid #d0d7de; border-radius: 6px; display: flex; align-items: center; }
        a { color: #0969da; text-decoration: none; font-weight: 500; width: 100%; }
        a:hover { text-decoration: underline; }
        .icon { margin-right: 10px; font-weight: bold; }
        .error { color: #cf222e; background: #ffebe9; padding: 12px; border: 1px solid #ffc1c0; border-radius: 6px; }
    </style>
</head>
<body>

    <h1>Code Browser</h1>
    <div id="file-list">Loading repository contents...</div>

    <script>
        async function fetchRepoFiles() {
            const username = 'nithinkasturi-collab';
            
            // 1. CHOOSE YOUR DEPLOYMENT MODE BELOW:
            // IF YOUR REPOSITORY SITE HAS A NAME LIKE: nithinkasturi-collab.github.io/my-project
            // -> Change 'YOUR_REPO_NAME' to match your actual GitHub repository name exactly.
            const repoName = 'YOUR_REPO_NAME'; 

            // IF YOUR REPOSITORY SITE IS YOUR MAIN HOMEPAGE SITE: nithinkasturi-collab.github.io
            // -> Uncomment the line below (remove the //) and delete the line above:
            // const repoName = 'nithinkasturi-collab.github.io';

            const container = document.getElementById('file-list');

            // Correctly targets the secure official GitHub REST API endpoint
            const apiUrl = `github.com{username}/${repoName}/contents`;

            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Repository "${repoName}" not found. Verify that the spelling matches exactly and that the repository visibility is Public.`);
                    }
                    throw new Error(`GitHub REST API returned status code ${response.status}.`);
                }
                
                const files = await response.json();
                let html = '<ul>';

                // Sort directory listings first, then standard files
                files.sort((a, b) => (b.type === 'dir') - (a.type === 'dir'));

                let displayedItemsCount = 0;

                files.forEach(file => {
                    // Do not list this browser script interface file itself
                    if (file.name === 'index.html') return;

                    displayedItemsCount++;
                    const isDir = file.type === 'dir';
                    const icon = isDir ? '📁' : '📄';
                    const targetUrl = isDir ? `${file.name}/` : file.name;

                    html += `<li><span class="icon">${icon}</span><a href="${targetUrl}">${file.name}</a></li>`;
                });

                html += '</ul>';
                container.innerHTML = displayedItemsCount === 0 ? '<p>No target assets or scripts found in this directory path.</p>' : html;

            } catch (error) {
                container.innerHTML = `<div class="error"><strong>Error Fetching Data:</strong> ${error.message}</div>`;
            }
        }

        fetchRepoFiles();
    </script>
</body>
</html>
